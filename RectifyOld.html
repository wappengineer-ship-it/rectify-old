<script>

var x = {};


x.e = function (p_id) {
    return document.getElementById(p_id);
};

x.rf = function (pScale) { //rf = Relative Font size
    return Math.round(pScale * x.FontSize) + 'px';
};

x.GetMainDiv = function (p_id) {
    return '<div id = "' + p_id + '" style = "width:100%; display:none"></div>';
};

x.sp = function (pHeight) { //GetSpacer
    return '<div style="width:100%; height:' + x.rf(pHeight) + '"></div>';
};

x.GetHeading = function (pText, optionalAlign) {
    optionalAlign = optionalAlign || 'left';
    var padding = x.rf(0.3) + ' ' + x.rf(0.2) + ' ' + x.rf(0.3) + ' ' + x.rf(0.4);
    return '<div style = "text-align: ' + optionalAlign + '; color:white; border-radius:' + x.rf(0.3) + ';  background-color: gray ; width:98%; padding:' + padding + '; font-weight:bold; font-size:' + x.rf(1.1) + '">' + pText + '</div>';
};

x.GetButton = function (pText, pOnClick, pWidth, optional_id, optionalPadding, optionalAlign) {
    optionalPadding = optionalPadding || 0.55;
    optionalAlign = optionalAlign || 'center';
    var id = '';
    if (optional_id) {
        id = 'id = "' + optional_id + '"';
    }
    return '<button ' + id + ' onclick = "' + pOnClick + '" style = "border: 5px solid white;background-color:lightgray; color: '+ x.ThemeColor2 +';border-radius:' + x.rf(0.3) + '; text-align:' + optionalAlign + '; width:' + pWidth + '%; padding:' + x.rf(optionalPadding) + '; font-size:' + x.rf(1.1) + '; ">' + pText + '</button>';
};


x.Show = function (pScreen) {
    pScreen.div.style.display = 'inline-block';
    scrollTo(0, pScreen.pageYOffset || 0);
};

x.Hide = function (pScreen) {
    pScreen.pageYOffset = pageYOffset;
    pScreen.div.style.display = 'none';
};

x.ShowElement = function (p_id) {
    var e = x.e(p_id);
    e.style.display = 'inline-block';
};

x.HideElement = function (p_id) {
    var e = x.e(p_id);
    e.style.display = 'none';
};

x050.UseHP = function () {

x.HideElement('x050_HP')
  }
};

x050.UsePB = function () {

x.HideElement('x050_PB')
  }

      clearInterval(x050.Interval)
      x050.Interval = setInterval(x050.Fight2, x050.HitDuration*(x100.Followers + 1)*(x050.UsedPB + 1))
  }
  
};

x050.Fight = function (){

    x050.HP = 5*x100.ArmourLevel; 
    if (x.Level == 50){
x050.HP /= 2;
    }
    x050.EnemyHP = Math.ceil((4 + x.Level));
    x050.EnemyDexRatio = 0.9**x.Level;

    x050.HitDuration = 3000*x050.EnemyDexRatio;
    
    var Switch = 1;
    x050.Fight2 = function () {
        if (x050.DirectionOfStrike){
            x.e('x050_'+ x050.DirectionOfStrike).style.border = '5px solid white';
        }
        if (x.e('x050_'+ x050.HilitedButton)){
            x.e('x050_'+ x050.HilitedButton).style.border = '5px solid white';
        }
        if (x050.Responded == false){
            x050.HP--;
            if (x050.HP <= 0){
                clearInterval(x050.Interval)
                x.e('xRightColumn').style.visibility = 'hidden';
                x.Nuggets = 0;
                localStorage.Nuggets = x.Nuggets;                    x.Displacement -= 10;
                x.UpdateBar()
                x051.Begin(x050, 'You died', 'Reset level?', function (r){
                    x.e('xRightColumn').style.visibility = 'visible';
                    if (r == 'y') {
                        x.Level = 1;
                        
                    } else {
           
                    }        
                    localStorage.Level = x.Level;
                    //x.Displacement -= 10;
                    x100.Begin()     
                    x.e('xFullScreenDiv').innerHTML = 'Level ' + x.Level + '| Nuggets: ' + x.Nuggets;
    
                })
            }
        }
        x050.Responded = false;
        if (Switch%2 == 1){ //Fight
            var DirectionOfStrike = Math.floor(Math.random()*9) + 1;
            x050.HilitedButton = DirectionOfStrike;
            x.e('x050_'+ x050.HilitedButton).style.border = '5px solid orange';
            x050.CanAttack = false;
        } else { //Between Strike
            x.e('x050_'+ x050.HilitedButton).style.border = '5px solid white';
            x050.CanAttack = true;
            x050.Responded = 'break';
            //x050.HilitedButton = false;
        }

        Switch++
        x050.Switch = Switch;
    }
    x050.Interval = setInterval(x050.Fight2, x050.HitDuration*(x100.Followers + 1)*(x050.UsedPB + 1))
};
x050.Respond = function (pDirectionOfStrike) {
    if (x050.Responded == true){return}
    x050.DirectionOfStrike = pDirectionOfStrike;
    x050.Responded = true;
    if (pDirectionOfStrike == x050.HilitedButton){
        x.e('x050_'+ x050.HilitedButton).style.border = '5px solid green';
        //x050.HilitedButton = false;
    } else {
        if (x050.CanAttack == false){
            //Missed block
            x050.HP--;
            if (x050.HP <= 0){
                clearInterval(x050.Interval)
                x.e('xRightColumn').style.visibility = 'hidden';
                x051.Begin(x050, 'You died', 'Reset level?', function (r){
                    x.e('xRightColumn').style.visibility = 'visible';
                    if (r == 'y') {
                        x.Level = 1;
                        
                    } else {
           
                    }        
                    x.Nuggets = 0;
                    localStorage.Nuggets = x.Nuggets;                    x.Displacement -= 10;
                    localStorage.Level = x.Level;
                    x100.Begin()     
                    x.e('xFullScreenDiv').innerHTML = 'Level ' + x.Level + '| Nuggets: ' + x.Nuggets;
    
                })
            }
        } else {
            x050.EnemyHP = x050.EnemyHP - x100.WeaponLevel - x100.Followers;
            x.e('x050_'+ pDirectionOfStrike).style.border = '5px solid red';

            if (x050.EnemyHP <= 0){            
                clearInterval(x050.Interval)
                x.e('xRightColumn').style.visibility = 'hidden';
                x051.Begin(x050, 'Victory!', 'Loot?', function (r){
                    x.e('xRightColumn').style.visibility = 'visible';
                    x.Level++
                    localStorage.Level = x.Level;
                      if (r == 'y') {
                        if (x.Level <= 50) {
                              x.Nuggets += 10*(x.Level - 1);
                     
                        } else {
                              x.Nuggets += 100000
                     
                        }
                         localStorage.Nuggets = x.Nuggets;
                        x.e('xFullScreenDiv').innerHTML = 'Level ' + x.Level + '| Nuggets: ' + x.Nuggets;

                        x100.Begin();

                    } else {
                        //x050.EnemyHP ++;
                        x100.Begin();
                    } 
                    
                })
            }

        }
    }    
};

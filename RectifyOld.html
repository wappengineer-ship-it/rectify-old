<html>
<head>
<title>Rectify</title>
<meta charset="UTF-8">
<!--<link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
<link rel="icon" href="favicon.ico" type="image/x-icon">-->
<link rel="stylesheet" href="styles.css">
</head>
<body>
<main id = "xOuterFrame">
    <span id="xLoadingSpan">Rectify base code loading...</span>
</main>

<script src="x_Globals.js" type="text/javascript"></script>
<script src="x050_Fight.js" type="text/javascript"></script>
<script src="x_Messages.js" type="text/javascript"></script>
<script src="x000_Landing" type="text/javascript"></script>
<script src="x100_World" type="text/javascript"></script>

<script>
x.Begin = function () {

    var h = '';
    h += x.GetMainSection('xCancel');
    h += x.GetMainSection('xWait');
    h += x.GetMainSection('x050');
    h += x.GetMainSection('x051');
    h += x.GetMainSection('x052');
    h += x.GetMainSection('x053');

    h += x.GetMainSection('x090');

    h += x.GetMainSection('x100');
    h += x.GetMainSection('x200');
    h += x.GetMainSection('x300');
    h += x.GetMainSection('x400');
     h += '<section id="x000"></section>';


    h += 
    `<div id = "xBottomBar">Level `+ x.Level +` | Nuggets: `+ x.Nuggets +`</div>`;

    x.e('xOuterFrame').innerHTML = h;

    document.addEventListener('keydown', function (event) {
        x.DocumentKeyEvent = event;
    });

    window.onorientationchange = function (){
        x100.Stop()
    }
};

x.Begin();
x000.Begin();
</script>
</body>
</html>

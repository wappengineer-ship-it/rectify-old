x050.UseHP = function () {
  x100.HealthPotions--
  localStorage.HealthPotions = x100.HealthPotions;
  x050.HP = 5*x100.ArmourLevel; 
  if (x100.HealthPotions == 0) {
x.Hide('x050_HP')
  }
};

x050.UsePB = function () {
  x100.PoisonBombs--
  
  localStorage.PoisonBombs = x100.PoisonBombs;
  x050.UsedPB++
  if (x100.PoisonBombs == 0) {
x.Hide('x050_PB')
  }
  if (!x050.Interval == null){
      clearInterval(x050.Interval)
      x050.Interval = setInterval(x050.Fight2, x050.HitDuration*(x100.Followers + 1)*(x050.UsedPB + 1))
  }
  
};

x050.Fight = function (){

    x050.HP = 5*x100.ArmourLevel; 
    if (x.Level == 50){
x050.HP /= 2;
    }
    x050.EnemyHP = Math.ceil((4 + x.Level));
    x050.EnemyDexRatio = 0.9**x.Level;

    x050.HitDuration = 3000*x050.EnemyDexRatio;
    
    var Switch = 1;
    x050.Fight2 = function () {
        if (x050.DirectionOfStrike){
            x.e('x050_'+ x050.DirectionOfStrike).style.border = '5px solid white';
        }
        if (x.e('x050_'+ x050.HilitedButton)){
            x.e('x050_'+ x050.HilitedButton).style.border = '5px solid white';
        }
        if (x050.Responded == false){
            x050.HP--;
            if (x050.HP <= 0){
                clearInterval(x050.Interval)
                x.Nuggets = 0;
                localStorage.Nuggets = x.Nuggets;                    x.Displacement -= 10;
                x.UpdateBar()
                x051.Begin('x050', 'You died', 'Reset level?', function (r){
                    if (r == 'y') {
                        x.Level = 1;
                        
                    } else {
           
                    }        
                    localStorage.Level = x.Level;
                    //x.Displacement -= 10;
                    x100.Begin()     
                    x.e('xBottomBar').innerHTML = 'Level ' + x.Level + '| Nuggets: ' + x.Nuggets;
    
                })
            }
        }
        x050.Responded = false;
        if (Switch%2 == 1){ //Fight
            var DirectionOfStrike = Math.floor(Math.random()*9) + 1;
            x050.HilitedButton = DirectionOfStrike;
            x.e('x050_'+ x050.HilitedButton).style.border = '5px solid orange';
            x050.CanAttack = false;
        } else { //Between Strike
            x.e('x050_'+ x050.HilitedButton).style.border = '5px solid white';
            x050.CanAttack = true;
            x050.Responded = 'break';
            //x050.HilitedButton = false;
        }

        Switch++
        x050.Switch = Switch;
    }
    x050.Interval = setInterval(x050.Fight2, x050.HitDuration*(x100.Followers + 1)*(x050.UsedPB + 1))
};
x050.Respond = function (pDirectionOfStrike) {
    if (x050.Responded == true){return}
    x050.DirectionOfStrike = pDirectionOfStrike;
    x050.Responded = true;
    if (pDirectionOfStrike == x050.HilitedButton){
        x.e('x050_'+ x050.HilitedButton).style.border = '5px solid green';
        //x050.HilitedButton = false;
    } else {
        if (x050.CanAttack == false){
            //Missed block
            x050.HP--;
            if (x050.HP <= 0){
                clearInterval(x050.Interval)
                x051.Begin('x050', 'You died', 'Reset level?', function (r){
                    if (r == 'y') {
                        x.Level = 1;
                        
                    } else {
           
                    }        
                    x.Nuggets = 0;
                    localStorage.Nuggets = x.Nuggets;                    x.Displacement -= 10;
                    localStorage.Level = x.Level;
                    x100.Begin()     
                    x.e('xBottomBar').innerHTML = 'Level ' + x.Level + '| Nuggets: ' + x.Nuggets;
    
                })
            }
        } else {
            x050.EnemyHP = x050.EnemyHP - x100.WeaponLevel - x100.Followers;
            x.e('x050_'+ pDirectionOfStrike).style.border = '5px solid red';

            if (x050.EnemyHP <= 0){            
                clearInterval(x050.Interval)
                x051.Begin('x050', 'Victory!', 'Loot?', function (r){
                    x.Level++
                    localStorage.Level = x.Level;
                      if (r == 'y') {
                        if (x.Level <= 50) {
                              x.Nuggets += 10*(x.Level - 1);
                     
                        } else {
                              x.Nuggets += 100000
                     
                        }
                         localStorage.Nuggets = x.Nuggets;
                        x.e('xBottomBar').innerHTML = 'Level ' + x.Level + '| Nuggets: ' + x.Nuggets;

                        x100.Begin();

                    } else {
                        //x050.EnemyHP ++;
                        x100.Begin();
                    } 
                    
                })
            }

        }
    }    
};

x.Displacement = parseInt(localStorage.Displacement) || 0;

} else {

}

    const canvas = document.getElementById("x100_Canvas");
    x100.Canvas = canvas;

    x100.TerrainColor = 'Yellow';
    x100.SkyColor = 'Blue';
    x100.BodyColor = 'purple';

    if (x000.NewGame == true){
        localStorage.NewGame = false;
        x000.NewGame = false;
        const ctx = canvas.getContext("2d");

        var y = canvas.height*0.6;
        var sign;   
        var CharHeight;   

        x100.Slope = 0.3;
        for (var i = 0; i < canvas.width; i ++){
            sign = 2*Math.random();
            if (sign > 1) {
                sign = 1;
            } else {
                sign = -1;
            }
            y = y + sign*x100.Slope*Math.random()
            x100.Terrain.push(y);
            if (i == Math.floor(canvas.width)/2){
                //Height of character
                CharHeight = y;       
            }
            }
               
        //Land
        ctx.beginPath();
        ctx.moveTo(0, 100);
        for (var i = 0; i < x100.Terrain.length; i++){
        ctx.lineTo(i, x100.Terrain[i]);
        };
            
        ctx.fillStyle = x100.TerrainColor;
        ctx.lineTo(canvas.width, canvas.width);
        ctx.lineTo(0, canvas.width);
        ctx.stroke();
        ctx.fill();

        //Sky

        ctx.moveTo(0, 100);
        for (var i = 0; i < x100.Terrain.length; i++){
        ctx.lineTo(i, x100.Terrain[i]);
        };
            
        ctx.fillStyle = x100.SkyColor;
        ctx.lineTo(canvas.width, 0);
        ctx.lineTo(0, 0);
        ctx.stroke();
        ctx.fill();

        ctx.closePath();
        ctx.beginPath();
        ctx.rect(canvas.width/2 -5, canvas.height*0.7, 10, 10);
            
        ctx.fillStyle = x100.BodyColor;
        ctx.fill();
        ctx.stroke();
        ctx.closePath();
        } else {

    }

    x100.Move(-1)
    setTimeout(x100.Stop, 10)
};

            }

            ctx.stroke();
            ctx.closePath();
        }
    }//

    if (x.Displacement > - 6000 - canvas.width
    && x.Displacement < -5000 + canvas.width){
    height += 10; //For builings
    ctx.beginPath();
    ctx.rect(-5100 - x.Displacement, 
    height - 30, 60, 40);
    ctx.fillStyle = 'white';

    ctx.stroke();

    ctx.stroke();

    ctx.stroke();
    ctx.closePath();

    ctx.beginPath();
    ctx.rect(-5500 - x.Displacement, 
    height - 60, 140, 70);
    ctx.fillStyle = 'white';
    ctx.fill();
    ctx.stroke();
    ctx.closePath();

    ctx.beginPath();
    ctx.rect(-5700 - x.Displacement, 
    height - 30, 80, 40);
    ctx.fillStyle = 'white';
    ctx.fill();
    ctx.stroke();
    ctx.closePath();



    //Peeps
    y = 0.7*canvas.height;
    ctx.beginPath();
    ctx.rect(-5000 - x.Displacement, 
    y, 10, 10);
    ctx.fillStyle = 'lightblue';
    ctx.fill();
    ctx.stroke();
    ctx.closePath();

    ctx.beginPath();
    ctx.rect(-5200 - x.Displacement, 
    y, 10, 10);
    ctx.fillStyle = 'lightblue';
    ctx.fill();
    ctx.stroke();
    ctx.closePath();

    ctx.beginPath();
    ctx.rect(-5550 - x.Displacement, 
    y, 10, 10);
    ctx.fillStyle = 'lightblue';
    ctx.fill();
    ctx.stroke();
    ctx.closePath();
        
    ctx.beginPath();
    ctx.rect(-5600 - x.Displacement, 
    y, 10, 10);
    ctx.fillStyle = 'lightblue';
    ctx.fill();
    ctx.stroke();
    ctx.closePath();

    ctx.beginPath();
    ctx.rect(-5800 - x.Displacement, 
    y, 10, 10);
    ctx.fillStyle = 'lightblue';
    ctx.fill();
    ctx.stroke();
    ctx.closePath();

    ctx.beginPath();
    ctx.rect(-6000 - x.Displacement, 
    y, 10, 10);
    ctx.fillStyle = 'lightblue';
    ctx.fill();
    ctx.stroke();
    ctx.closePath();
    }
};

x053.Deposit = function () {

    localStorage.BankedNuggets = x.Nuggets;
    x.Nuggets = 0;
    localStorage.Nuggets = 0;
    localStorage.LastDeposited = new Date()
    x.UpdateBar();
    x053.UpdateBank()
    }//

    x053.Withdraw = function (){
        var date = new Date();
        var BankedNuggets = parseInt(localStorage.BankedNuggets) || 0;
        var OldDate = Date.parse(localStorage.LastDeposited)
        var MS = date - OldDate;
        var H = MS/1000/60/60;
        var Withdraw = BankedNuggets+ parseInt(BankedNuggets*1.1*(H))
        x.Nuggets += Withdraw;

        localStorage.Nuggets = x.Nuggets;
        localStorage.BankedNuggets = 0;
        x.UpdateBar();
        x053.UpdateBank()
    }
